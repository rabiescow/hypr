# random window rules
windowrule {
  name = windowrule-1
  tile = on
  match:class = ^(.*)(vivaldi)(.*)$
}

# windowrule = focusonactivate,class:^(.*)(vivaldi)(.*)$
# windowrulev2 = focusonactivate,class:^(.*)(vivaldi)(.*)$
windowrule {
  name = windowrule-2
  tile = on
  match:class = ^(.*)(firefox)(.*)$
}

# windowrulev2 = focusonactivate,class:^(.*)(firefox)(.*)$
windowrule {
  name = windowrule-3
  float = on
  size = (monitor_w*0.5) (monitor_h*0.8)
  move = ((monitor_w*0.1)) ((monitor_h*0.05))
  match:initial_class = ^(.*)thunar(.*)$
}

windowrule {
  name = windowrule-4
  size = (monitor_w*0.3) (monitor_h*0.5)
  match:title = ^(.*)Font(.*)$
}

windowrule {
  name = windowrule-5
  float = on
  match:initial_class = (.*)qpwgraph(.*)$
}


# Ignore maximize requests from apps. You'll probably like this.
windowrule {
  name = windowrule-6
  suppress_event = maximize
  match:class = .*
}


# Fix some dragging issues with XWayland
windowrule {
  name = windowrule-7
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}


# Eww widgets
windowrule {
  name = windowrule-8
  float = on
  match:class = ^(.*)(eww-workspace-selector)(.*)$
}

windowrule {
  name = windowrule-9
  center = on
  size = 1200 200
  match:class = ^(.*)(workspace-selector)(.*)$
}


